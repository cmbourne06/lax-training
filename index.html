<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LAX Training">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a5c3a">
<title>LAX Training Plan</title>
<style>
:root{
  --green:#0a5c3a;--green-lt:#e6f5ee;--green-md:#5dcaa5;
  --blue:#0c447c;--blue-lt:#e6f1fb;
  --red:#712b13;--red-lt:#faece7;
  --bg:#f5f5f3;--card:#fff;--border:#e0e0dc;
  --text:#111;--muted:#777;--sub:#aaa;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}
.topbar{background:var(--green);color:#fff;padding:calc(var(--safe-top) + 12px) 16px 12px;flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:17px;font-weight:700;letter-spacing:-.2px}
.app-sub{font-size:11px;opacity:.75;margin-top:2px}
.phase-chips{display:flex;gap:6px;margin-top:10px}
.pchip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,.35);color:rgba(255,255,255,.75);background:transparent;transition:all .12s;white-space:nowrap}
.pchip.on{background:#fff;color:var(--green);border-color:#fff}
.pchip.p2.on{color:var(--blue)}
.pchip.p3.on{color:var(--red)}
.daynav{background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.daynav::-webkit-scrollbar{display:none}
.daynav-inner{display:flex;padding:0 12px}
.dchip{padding:11px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .1s}
.dchip.on{color:var(--text);border-bottom-color:var(--green)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(var(--safe-bot) + 16px)}
.block-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.block-hdr{padding:10px 13px;background:#f8f8f6;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.seq-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.block-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.block-rat{font-size:10px;color:var(--sub);margin-top:1px}
.ex-row{padding:10px 13px;border-bottom:1px solid #f0f0ee}
.ex-row:last-child{border-bottom:none}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ex-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.sr-badge{font-size:11px;font-weight:700;color:var(--text);background:#f0f0ee;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.ex-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin:4px 3px 0 0}
.tag-chain{background:var(--green-lt);color:var(--green)}
.tag-prehab{background:var(--red-lt);color:var(--red)}
.ex-actions{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
.vid-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;background:#fff1f0;border:1px solid #fbb;color:#c0392b;font-size:11px;font-weight:600;text-decoration:none;cursor:pointer}
.vid-btn svg{flex-shrink:0}
.alt-toggle{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;background:var(--blue-lt);border:1px solid #b5d4f4;color:var(--blue);font-size:11px;font-weight:600;cursor:pointer}
.alt-panel{display:none;margin-top:7px;background:#f8f8f6;border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.alt-panel.open{display:block}
.alt-item{margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.alt-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.alt-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.alt-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--sub);margin-bottom:2px}
.alt-name{font-size:12px;font-weight:600;color:var(--muted);flex:1}
.alt-vid{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;background:#fff1f0;border:1px solid #fbb;color:#c0392b;font-size:10px;font-weight:600;text-decoration:none;flex-shrink:0}
.alt-note{font-size:10.5px;color:var(--sub);margin-top:3px;line-height:1.45}
.sa-item{padding:10px 13px;border-bottom:1px solid #f0f0ee}
.sa-item:last-child{border-bottom:none}
.sa-ex{font-size:13px;font-weight:600;color:var(--text)}
.sa-vol{font-size:11px;font-weight:700;color:var(--blue);margin-top:2px}
.sa-note{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}
.sa-vid{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:7px;background:#fff1f0;border:1px solid #fbb;color:#c0392b;font-size:11px;font-weight:600;text-decoration:none;margin-top:5px}
.info-pill{background:var(--green-lt);border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:11.5px;color:var(--green);line-height:1.6}
.info-pill strong{font-weight:700}
.scheme-bar{display:flex;gap:5px;flex-wrap:wrap;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);margin-bottom:10px;border-radius:10px}
.spill{padding:3px 9px;border-radius:14px;font-size:10.5px;color:var(--muted);border:1px solid var(--border);background:#f8f8f6}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="app-title">LAX Training Plan</div>
        <div class="app-sub">12-week off-season &middot; Age 16 &middot; Bourne Strategy</div>
      </div>
    </div>
    <div class="phase-chips">
      <button class="pchip p1 on" onclick="setPhase(1)">Phase 1</button>
      <button class="pchip p2" onclick="setPhase(2)">Phase 2</button>
      <button class="pchip p3" onclick="setPhase(3)">Phase 3</button>
    </div>
  </div>
  <div class="daynav"><div class="daynav-inner" id="daynav"></div></div>
  <div class="scroll" id="scroll"></div>
</div>
<script>
function yt(q){return 'https://www.youtube.com/results?search_query='+encodeURIComponent(q);}
function vidBtn(url){
  return '<a class="vid-btn" href="'+url+'" target="_blank"><svg width="12" height="12" viewBox="0 0 16 16"><path d="M6.5 11L11 8 6.5 5v6z" fill="#c0392b"/><rect x="1" y="1" width="14" height="14" rx="3" fill="none" stroke="#c0392b" stroke-width="1.5"/></svg>Watch</a>';
}
function altVidBtn(url){
  return '<a class="alt-vid" href="'+url+'" target="_blank"><svg width="11" height="11" viewBox="0 0 16 16"><path d="M6.5 11L11 8 6.5 5v6z" fill="#c0392b"/><rect x="1" y="1" width="14" height="14" rx="3" fill="none" stroke="#c0392b" stroke-width="1.5"/></svg>Watch</a>';
}

  {ex:'6×400m runs (grass loop)',vol:'6 reps',note:'Hard — not all-out. 90-sec rest. Peak lactate tolerance. Mirrors game sprint density.',vid:yt('400m interval training lacrosse conditioning')},
  {ex:'Full static stretch circuit',vol:'5 min',note:'Complete lower body + shoulder + hip flexor. Every session.',vid:yt('static stretch routine athletes post workout')}
 ]}
]}
}
};

var DAYS=[
  {id:'lift',label:'Lift day'},
  {id:'sa-a',label:'Speed & agility A'},
  {id:'sa-b',label:'Speed & agility B'}
];

var phase=1,dayId='lift',altOpen={};

function setPhase(p){
  phase=p;dayId='lift';altOpen={};
  document.querySelectorAll('.pchip').forEach(function(c,i){c.classList.toggle('on',i===p-1);});
  renderNav();renderDay();
}
function setDay(id){
  dayId=id;altOpen={};
  document.querySelectorAll('.dchip').forEach(function(c){c.classList.toggle('on',c.dataset.id===id);});
  renderDay();
  document.getElementById('scroll').scrollTop=0;
}
function renderNav(){
  document.getElementById('daynav').innerHTML=DAYS.map(function(d){
    return '<div class="dchip'+(d.id===dayId?' on':'')+'" data-id="'+d.id+'" onclick="setDay(\''+d.id+'\')">'+d.label+'</div>';
  }).join('');
}
function toggleAlt(key){
  altOpen[key]=!altOpen[key];
  var el=document.getElementById('alt-'+key);
  var btn=document.getElementById('altbtn-'+key);
  if(el){el.classList.toggle('open',!!altOpen[key]);}
  if(btn){btn.innerHTML=altOpen[key]?'&#9650;&nbsp;hide alternatives':'&#9660;&nbsp;show alternatives';}
}
function renderDay(){
  var html='';
  var sc=SCHEMES[phase];
  html+='<div class="scheme-bar">'+sc.map(function(s){return '<span class="spill">'+s+'</span>';}).join('')+'</div>';
  if(dayId==='lift'){
    var blocks=LIFT[phase];
    blocks.forEach(function(block){
      html+='<div class="block-card">';
      html+='<div class="block-hdr"><div class="seq-num">'+block.seq+'</div><div><div class="block-name">'+block.group+'</div><div class="block-rat">'+block.rat+'</div></div></div>';
      block.pairs.forEach(function(pair,pi){
        var p=pair.p;
        var key=block.seq+'-'+pi;
        var tags=(p.tags||[]).map(function(t){
          if(t==='chain')return '<span class="tag tag-chain">throw chain</span>';
          if(t==='prehab')return '<span class="tag tag-prehab">prehab</span>';
          return '';
        }).join('');
        html+='<div class="ex-row">';
        html+='<div class="ex-top"><div class="ex-name">'+p.n+'</div><div class="sr-badge">'+p.sr+'</div></div>';
        if(tags)html+=tags;
        html+='<div class="ex-note">'+p.note+'</div>';
        html+='<div class="ex-actions">';
        html+=vidBtn(p.vid);
        if(pair.alts&&pair.alts.length){
          html+='<div class="alt-toggle" id="altbtn-'+key+'" onclick="toggleAlt(\''+key+'\')">&#9660;&nbsp;show alternatives</div>';
        }
        html+='</div>';
        if(pair.alts&&pair.alts.length){
          html+='<div class="alt-panel" id="alt-'+key+'">';
          pair.alts.forEach(function(alt,ai){
            html+='<div class="alt-item">';
            html+='<div class="alt-label">alternative '+(ai+1)+'</div>';
            html+='<div class="alt-top"><div class="alt-name">'+alt.n+'</div>'+altVidBtn(alt.vid)+'</div>';
            html+='<div class="alt-note">'+alt.note+'</div>';
            html+='</div>';
          });
          html+='</div>';
        }
        html+='</div>';
      });
      html+='</div>';
    });
  } else {
    var data=SA[phase][dayId];
    html+='<div class="info-pill"><strong>'+data.title+'</strong><br>'+data.focus+'<br><span style="opacity:.8;font-size:10.5px">Equipment: '+data.equip+'</span></div>';
    data.blocks.forEach(function(block){
      html+='<div class="block-card">';
      html+='<div class="block-hdr"><div class="block-name">'+block.name+'</div></div>';
      block.items.forEach(function(item){
        html+='<div class="sa-item"><div class="sa-ex">'+item.ex+'</div><div class="sa-vol">'+item.vol+'</div><div class="sa-note">'+item.note+'</div>';
        if(item.vid)html+=altVidBtn(item.vid);
        html+='</div>';
      });
      html+='</div>';
    });
  }
  document.getElementById('scroll').innerHTML=html;
}
renderNav();renderDay();

if('serviceWorker' in navigator){
  var swCode='self.addEventListener("install",function(e){e.waitUntil(caches.open("lax-v1").then(function(c){return c.addAll([location.href]);}));});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));});';
  var blob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
}
</script>
</body>
</html>
